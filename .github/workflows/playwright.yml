name: CI de QA Automatizado
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        run: npx playwright test

      # 1. Generación de Reporte Allure
      - name: Generar Reporte Allure
        if: always()
        run: npm run allure:generate 

      # 2. Subir reporte a GitHub Pages (esto lo hace visible al equipo)
      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      # 3. Notificación a Slack (ejemplo simple)
      - name: Notificar a Slack
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: '¡Las pruebas fallaron! Revisa el reporte en GitHub.'